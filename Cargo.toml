[package]
name = "s3mem"
version = "0.1.0"
edition = "2021"
description = "OKF memory over S3 — portable agent memory as plain files"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nonato/s3mem"
readme = "README.md"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
thiserror = "1"
time = { version = "0.3", features = ["formatting"] }
